name: Poll Standings

on:
  schedule:
    # Nightly 2AM–7AM PDT (09:00–14:00 UTC). Starts at 2AM, retries hourly until
    # data is found, then skips remaining runs for the night (enforced server-side).
    - cron: '0 9-14 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Poll standings
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            https://whaleplayfantasy.com/api/cron/poll \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          echo "HTTP $STATUS"
          echo "$BODY" | jq .
          if [ "$STATUS" != "200" ]; then
            echo "Poll failed with status $STATUS"
            exit 1
          fi
          DATA_CHANGED=$(echo "$BODY" | jq -r '.dataChanged // false')
          if [ "$DATA_CHANGED" = "true" ]; then
            echo "✅ NEW DATA DETECTED"
          else
            echo "— No new data this poll"
          fi
